<button
  type="button"
  class="floating-action-btn"
  matRipple
  [attr.aria-label]="ariaLabel()"
  [matTooltip]="tooltip()"
  [matTooltipDisabled]="isTooltipDisabled()"
  [matTooltipPosition]="tooltipPosition()"
  [disabled]="disabled()"
  [style.--fab-bottom]="bottom()"
  [style.--fab-right]="right()"
  [style.--fab-mobile-bottom]="mobileBottom()"
  [style.--fab-mobile-right]="mobileRight()"
  [style.--fab-size]="size()"
  [style.--fab-mobile-size]="mobileSize()"
  [style.--fab-icon-size]="iconSize()"
  [style.--fab-bg]="backgroundColor()"
  [style.--fab-outline-color]="outlineColor()"
  (click)="onClick()"
>
  <i aria-hidden="true" [class]="resolvedIconClass()"></i>
</button>
