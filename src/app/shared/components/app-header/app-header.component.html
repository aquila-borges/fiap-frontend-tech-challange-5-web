<header class="app-header-wrap" aria-label="Cabeçalho principal">
  <div class="app-header app-glass-card">
    <span class="brand">
      <img
        src="full_logo_default_theme.png"
        width="918"
        height="225"
        alt="Mind Ease"
        class="brand-logo"
      />
    </span>

    <nav class="header-nav" aria-label="Navegação principal">
      <a
        class="header-link"
        routerLink="/dashboard"
        routerLinkActive="is-active"
      >
        Dashboard
      </a>

      <a
        class="header-link"
        routerLink="/dashboard"
      >
        Dashboard
      </a>
    </nav>

    <div class="header-right">
      @if (isOnline()) {
        <span class="status-chip status-online" aria-label="Status do sistema: online">
          <span class="status-dot" aria-hidden="true"></span>
          Online
        </span>
      } @else {
        <span class="status-chip status-offline" aria-label="Status do sistema: offline">
          <span class="status-dot" aria-hidden="true"></span>
          Offline
        </span>
      }
      <app-user-menu></app-user-menu>
    </div>
  </div>
</header>
