<header class="app-header-wrap" aria-label="Cabecalho principal">
  <div class="app-header app-glass-card">
    <span class="brand">
      <img
        src="full_logo_default_theme.png"
        width="918"
        height="225"
        alt="Mind Ease"
        class="brand-logo"
      />
    </span>

    <nav class="header-nav" aria-label="Navegacao principal">
      <a
        class="header-link"
        routerLink="/dashboard"
        routerLinkActive="is-active"
      >
        Dashboard
      </a>
    </nav>

    <div class="header-right">
      <span class="status-chip" aria-label="Status do sistema: online">
        <span class="status-dot" aria-hidden="true"></span>
        Online
      </span>
    </div>
  </div>
</header>

@if (!isOffcanvasOpen()) {
  <button
    type="button"
    class="accessibility-floating-btn"
    (click)="toggleOffcanvas()"
    aria-label="Abrir menu de acessibilidade"
  >
    <mat-icon aria-hidden="true">accessibility_new</mat-icon>
  </button>
}

<div
  class="offcanvas offcanvas-end"
  [class.show]="isOffcanvasOpen()"
  [class.scaled-widget]="isWidgetScaled()"
  tabindex="-1"
  id="accessibilityOffcanvas"
  aria-labelledby="accessibilityOffcanvasLabel"
>
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="accessibilityOffcanvasLabel">Menu de acessibilidade</h5>
    <button
      type="button"
      class="btn-close"
      (click)="toggleOffcanvas()"
      aria-label="Fechar"
    ></button>
  </div>
  <div class="offcanvas-body">
    <div class="accessibility-section">
      <div class="toggle-container shadow-sm">
        <label class="toggle-switch">
          <span class="toggle-label">Widget superdimensionado</span>
          <input
            type="checkbox"
            [checked]="isWidgetScaled()"
            (change)="toggleWidgetScale()"
            aria-label="Ativar widget superdimensionado do menu de acessibilidade"
          />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="accessibility-section">
      <div class="toggle-container shadow-sm">
        <label class="toggle-switch">
          <span class="toggle-label">Fonte de alta legibilidade</span>
          <input
            type="checkbox"
            [checked]="useAccessibleFont()"
            (change)="toggleAccessibleFont()"
            aria-label="Alternar para fonte de alta legibilidade"
          />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="accessibility-section">
      <h6 class="section-title">Tamanho da fonte</h6>
      <div class="font-controls shadow-sm">
        <button
          type="button"
          class="font-btn"
          (click)="decreaseFontSize()"
          [disabled]="isScaleMinned()"
          [attr.aria-label]="'Diminuir tamanho da fonte. Tamanho atual: ' + currentScale() + ' por cento'"
        >
          A-
        </button>

        <span class="font-scale-counter" aria-live="polite" aria-atomic="true">
          {{ currentScale() }}%
        </span>

        <button
          type="button"
          class="font-btn"
          (click)="increaseFontSize()"
          [disabled]="isScaleMaxed()"
          [attr.aria-label]="'Aumentar tamanho da fonte. Tamanho atual: ' + currentScale() + ' por cento'"
        >
          A+
        </button>
      </div>
    </div>

    <div class="accessibility-section">
      <div class="spacing-cards-row">
        <button
          type="button"
          class="line-height-trigger shadow-sm"
          [class.active]="isCustomLineHeightActive()"
          (click)="cycleLineHeight()"
          [attr.aria-label]="'Alterar altura da linha. Valor atual: ' + currentLineHeight() + 'x'"
        >
          <i class="fa-solid fa-text-height" aria-hidden="true"></i>
          <span class="line-height-label">Altura da linha</span>
          <span class="line-height-current">{{ currentLineHeight() }}x</span>
        </button>

        <button
          type="button"
          class="line-height-trigger shadow-sm"
          [class.active]="isCustomTextSpacingActive()"
          (click)="cycleTextSpacing()"
          [attr.aria-label]="'Alterar espaçamento de texto. Nível atual: ' + currentTextSpacingLabel()"
        >
          <i class="fa-solid fa-text-width" aria-hidden="true"></i>
          <span class="line-height-label">Espaçamento do texto</span>
          <span class="line-height-current">{{ currentTextSpacingLabel() }}</span>
        </button>
      </div>
    </div>

    <div class="accessibility-section">
      <button
        type="button"
        class="reset-btn"
        (click)="resetAccessibilitySettings()"
        aria-label="Reverter todas as configurações de acessibilidade"
      >
        <i class="fa-solid fa-rotate-left" aria-hidden="true"></i>
        Reverter todas as configurações
      </button>
    </div>
  </div>
</div>

@if (isOffcanvasOpen()) {
  <div class="offcanvas-backdrop fade show" (click)="toggleOffcanvas()"></div>
}
