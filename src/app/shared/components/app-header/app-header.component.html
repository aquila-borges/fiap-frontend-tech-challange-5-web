<header class="app-header-wrap" aria-label="Cabeçalho principal">
  <div class="app-header app-glass-card">
    <a class="brand" routerLink="/dashboard" aria-label="Voltar para o dashboard">
      <picture>
        <source media="(min-width: 768px)" srcset="full_logo_default_theme.png">
        <img
          src="logo_default_theme.png"
          width="225"
          height="225"
          alt="Mind Ease"
          class="brand-logo"
        />
      </picture>
    </a>

    <nav class="header-nav" aria-label="Navegação principal">
      <a
        class="header-link"
        routerLink="/dashboard"
        routerLinkActive="is-active"
      >
        Dashboard
      </a>

      <a
        class="header-link"
        routerLink="/pomodoro"
        routerLinkActive="is-active"
      >
        Pomodoro
      </a>
    </nav>

    <div class="header-right">
      @if (isOnline()) {
        <span class="status-chip status-online" aria-label="Status do sistema: online">
          <span class="status-dot" aria-hidden="true"></span>
          Online
        </span>
      } @else {
        <span class="status-chip status-offline" aria-label="Status do sistema: offline">
          <span class="status-dot" aria-hidden="true"></span>
          Offline
        </span>
      }
      <app-user-menu></app-user-menu>
    </div>
  </div>
</header>
