<div class="user-menu" aria-label="Menu do usuario">
  <button
    type="button"
    class="user-menu-trigger"
    aria-label="Abrir menu do usuario"
    (click)="toggleDropdown()"
    [attr.aria-expanded]="isDropdownOpen()"
  >
    <span class="user-avatar" aria-hidden="true">
      <i class="fa-solid fa-user" aria-hidden="true"></i>
    </span>
    <span class="user-name">Olá, <strong>{{ firstName() }}</strong></span>
    <i class="fa-solid fa-chevron-down dropdown-arrow" aria-hidden="true" [class.open]="isDropdownOpen()"></i>
  </button>

  @if (isDropdownOpen()) {
    <div class="dropdown-backdrop" (click)="closeDropdown()"></div>
    <ul class="app-dropdown">
      <li>
        <a class="dropdown-item" routerLink="/dashboard" (click)="closeDropdown()">
          <i class="fa-solid fa-chart-line menu-icon" aria-hidden="true"></i>
          <span>Meu painel</span>
        </a>
      </li>
      <li>
        <button type="button" class="dropdown-item" (click)="closeDropdown()">
          <i class="fa-solid fa-user menu-icon" aria-hidden="true"></i>
          <span>Perfil</span>
        </button>
      </li>
      <li>
        <button type="button" class="dropdown-item" (click)="closeDropdown()">
          <i class="fa-solid fa-gear menu-icon" aria-hidden="true"></i>
          <span>Configuracoes</span>
        </button>
      </li>
      <li><hr class="dropdown-divider"></li>
      <li>
        <button type="button" class="dropdown-item dropdown-item-danger" (click)="openLogoutDialog()">
          <i class="fa-solid fa-right-from-bracket menu-icon" aria-hidden="true"></i>
          <span>Sair</span>
        </button>
      </li>
    </ul>
  }
</div>

<ng-template #logoutConfirmDialog let-dialogRef="dialogRef">
  <section class="logout-dialog-content" role="dialog" aria-labelledby="logoutConfirmTitle" aria-modal="true">
    <h2 id="logoutConfirmTitle" class="logout-dialog-title">Confirmar saída</h2>
    <p class="logout-dialog-text">Deseja sair da sua conta?</p>

    <div class="logout-dialog-actions">
      <app-secondary-button
        type="button"
        label="Cancelar"
        (clicked)="dialogRef.close(false)"
      />
      <app-primary-button
        type="button"
        label="Sim, sair"
        (clicked)="dialogRef.close(true)"
      />
    </div>
  </section>
</ng-template>
