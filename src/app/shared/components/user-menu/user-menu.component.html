<div class="user-menu" aria-label="Menu do usuário" appClickOutside (clickOutside)="closeDropdown()">
  <button
    type="button"
    class="user-avatar-button"
    aria-label="Menu do usuário"
    (click)="toggleDropdown()"
    [attr.aria-expanded]="isDropdownOpen()"
    aria-haspopup="true"
  >
    <span class="user-avatar-circle" aria-hidden="true">
      <i class="fa-solid fa-user"></i>
    </span>
  </button>

  @if (isDropdownOpen()) {
    <div class="dropdown-backdrop" [class.closing]="isDropdownClosing()" (click)="closeDropdown()"></div>
    <ul class="app-dropdown" [class.closing]="isDropdownClosing()">
      <li>
        <a class="dropdown-item" routerLink="/dashboard" (click)="closeDropdown()">
          <i class="fa-solid fa-chart-line menu-icon" aria-hidden="true"></i>
          <span>Meu painel</span>
        </a>
      </li>
      <li>
        <button type="button" class="dropdown-item" (click)="closeDropdown()">
          <i class="fa-solid fa-user menu-icon" aria-hidden="true"></i>
          <span>Perfil</span>
        </button>
      </li>
      <li>
        <button type="button" class="dropdown-item" (click)="closeDropdown()">
          <i class="fa-solid fa-gear menu-icon" aria-hidden="true"></i>
          <span>Configurações</span>
        </button>
      </li>
      <li><hr class="dropdown-divider"></li>
      <li>
        <button type="button" class="dropdown-item dropdown-item-danger" (click)="openLogoutDialog()">
          <i class="fa-solid fa-right-from-bracket menu-icon" aria-hidden="true"></i>
          <span>Sair</span>
        </button>
      </li>
    </ul>
  }
</div>

<ng-template #logoutConfirmDialog let-dialogRef="dialogRef">
  <div class="modal-content" role="dialog" aria-labelledby="logoutConfirmTitle" aria-modal="true">
    <div class="modal-header">
      <h5 id="logoutConfirmTitle" class="modal-title">Confirmar saída</h5>
      <button type="button" class="btn-close" aria-label="Fechar" (click)="dialogRef.close(false)"></button>
    </div>

    <div class="modal-body">
      <p>Deseja sair da sua conta?</p>
    </div>

    <div class="modal-footer">
      <app-secondary-button
        type="button"
        label="Cancelar"
        (clicked)="dialogRef.close(false)"
      />
      <app-primary-button
        type="button"
        label="Sim, sair"
        (clicked)="dialogRef.close(true)"
      />
    </div>
  </div>
</ng-template>
