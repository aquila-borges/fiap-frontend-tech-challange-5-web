<div class="login-container">
  <div class="login-card">
    <h1>Login</h1>
    
    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          [value]="email()"
          (input)="email = $any($event.target).value"
          placeholder="seu@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input 
          type="password" 
          id="password" 
          [value]="password()"
          (input)="password = $any($event.target).value"
          placeholder="••••••••"
          required
        />
      </div>

      @if (errorMessage()) {
        <div class="error-message">
          {{ errorMessage() }}
        </div>
      }

      <div class="button-group">
        <button 
          type="submit" 
          class="btn-primary"
          [disabled]="loading()"
        >
          @if (loading()) {
            Carregando...
          } @else {
            Entrar
          }
        </button>

        <button 
          type="button" 
          class="btn-secondary"
          (click)="onRegister()"
          [disabled]="loading()"
        >
          Criar Conta
        </button>
      </div>
    </form>
  </div>
</div>
