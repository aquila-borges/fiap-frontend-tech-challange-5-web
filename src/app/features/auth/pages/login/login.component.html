<div class="login-page">
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-card col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
      <div class="row mb-4">
        <div class="col">
          <h1 class="h3 text-center">Login</h1>
        </div>
      </div>

      <div class="row">
        <div class="col">
          @if (errorMessage()) {
            <div class="alert alert-danger mb-3" role="alert" aria-live="polite">
              {{ errorMessage() }}
            </div>
          }

          <form [formGroup]="form" novalidate (ngSubmit)="onLogin()">
            <app-auth-form [form]="form" [disabled]="loading()"></app-auth-form>

            <div class="d-flex flex-column gap-2 mt-4">
              <button
                type="submit"
                class="btn btn-primary"
                [disabled]="loading() || form.invalid"
              >
                @if (loading()) {
                  <span
                    class="spinner-border spinner-border-sm me-2"
                    role="status"
                    aria-hidden="true"
                  ></span>
                  Carregando...
                } @else {
                  Entrar
                }
              </button>

              <button
                type="button"
                class="btn btn-outline-secondary"
                (click)="onRegister()"
                [disabled]="loading()"
              >
                Criar Conta
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
