<app-floating-action-button
  ariaLabel="Editar tarefa selecionada"
  [tooltip]="disabled() ? 'Selecione apenas uma tarefa para editar' : 'Não é possível editar múltiplas tarefas ao mesmo tempo'"
  icon="edit"
  bottom="360px"
  right="48px"
  mobileBottom="19.325rem"
  mobileRight="1.5rem"
  iconSize="32px"
  backgroundColor="var(--primary-color-dark)"
  outlineColor="var(--primary-color-dark)"
  [disabled]="disabled()"
  (clicked)="onEditSelected()"
></app-floating-action-button>
