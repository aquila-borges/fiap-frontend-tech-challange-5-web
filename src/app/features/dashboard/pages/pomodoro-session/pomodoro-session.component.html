<div class="pomodoro-session-page page-background page-with-header">
  <main class="container py-4">
    <div class="row mb-3">
      <div class="col">
        <section class="pomodoro-selection-instruction" role="status" aria-live="polite">
          <p>Selecione até 4 cards e depois aperte o botão no canto para iniciar o Pomodoro.</p>
        </section>
      </div>
    </div>

    <div class="row">
      <div class="col">
        <app-task-panel
          #taskCardsPanel
          [tasks]="tasks()"
          [isLoading]="isLoadingTasks()"
          [isPomodoroSelectMode]="true"
          [clearSelectionTrigger]="0"
          [editSelectedTaskTrigger]="0"
          [deleteSelectedTasksTrigger]="0"
        />
      </div>
    </div>
  </main>

  <app-exit-pomodoro-mode-floating-button
    (exitPomodoroClick)="onExitPomodoroMode()"
  />

  <app-start-pomodoro-session-floating-button
    [disabled]="taskCardsPanel.selectedTasksCount() === 0"
    (startPomodoroClick)="onStartPomodoroSession()"
  />
</div>
