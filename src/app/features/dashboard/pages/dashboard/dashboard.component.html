<div class="dashboard-page page-background page-with-header">
  <main class="container py-4">
    <div class="row">
      <div class="col">
        <app-task-panel
          #taskCardsPanel
          [tasks]="tasks()"
          [isLoading]="isLoadingTasks()"
          [isPomodoroSelectMode]="false"
          [clearSelectionTrigger]="clearTaskSelectionTrigger()"
          [editSelectedTaskTrigger]="editSelectedTaskTrigger()"
          [deleteSelectedTasksTrigger]="deleteSelectedTasksTrigger()"
          (tasksDeleted)="onTasksDeleted($event)"
          (taskEdit)="onTaskEdit($event)"
        />
      </div>
    </div>
  </main>

  @if (taskCardsPanel.hasSelectedTasksForActions() && (taskCardsPanel.isBelowMdViewport() || !taskCardsPanel.isHeaderActionsVisible())) {
    <app-clear-selection-floating-button
      (clearSelectionClick)="onClearSelectedTasksRequested()"
    />

    <app-edit-selected-floating-button
      [disabled]="taskCardsPanel.selectedTasksCount() !== 1"
      (editSelectedClick)="onEditSelectedTaskRequested()"
    />

    <app-delete-selected-floating-button
      (deleteSelectedClick)="onDeleteSelectedTasksRequested()"
    />
  }

  <button
    type="button"
    class="pomodoro-floating-btn"
    aria-label="Abrir pomodoro"
    matTooltip="Método Pomodoro"
    matTooltipPosition="right"
    (click)="onOpenPomodoroSetup()"
  >
    <img
      src="pomodoro2.png"
      width="34"
      height="34"
      alt=""
      aria-hidden="true"
    />
  </button>

  <app-add-task-floating-button (taskCreated)="onTaskCreated($event)" />
</div>
