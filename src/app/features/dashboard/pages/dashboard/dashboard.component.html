<div class="dashboard-page page-background page-with-header">
  <main class="container py-4">
    @if (isPomodoroPanelRendered()) {
      <div
        class="pomodoro-panel-shell"
        [class.pomodoro-panel-shell--visible]="isPomodoroPanelVisible()"
      >
        <div class="row">
          <div class="col">
            <app-pomodoro-panel
              (closeRequested)="onClosePomodoroPanel()"
              (startRequested)="onStartPomodoroTaskSelect()"
            />
          </div>
        </div>
      </div>
    }

    <div class="row">
      <div class="col">
        <app-task-cards-panel
          #taskCardsPanel
          [tasks]="tasks()"
          [isLoading]="isLoadingTasks()"
          [isPomodoroSelectMode]="isPomodoroTaskSelectMode()"
          (tasksDeleted)="onTasksDeleted($event)"
          (taskEdit)="onTaskEdit($event)"
        />
      </div>
    </div>
  </main>

  @if (!isPomodoroTaskSelectMode() && taskCardsPanel.hasSelectedTasksForActions() && (taskCardsPanel.isBelowMdViewport() || !taskCardsPanel.isHeaderActionsVisible())) {
    <app-clear-selection-floating-button
      (clearSelectionClick)="taskCardsPanel.clearSelectedTasks()"
    />

    <app-edit-selected-floating-button
      [disabled]="taskCardsPanel.selectedTasksCount() !== 1"
      (editSelectedClick)="taskCardsPanel.editSelectedTask()"
    />

    <app-delete-selected-floating-button
      (deleteSelectedClick)="taskCardsPanel.deleteSelectedTasks()"
    />
  }

  @if (isPomodoroTaskSelectMode()) {
    <app-exit-pomodoro-mode-floating-button
      (exitPomodoroClick)="onExitPomodoroMode()"
    />

    <app-start-pomodoro-session-floating-button
      [disabled]="taskCardsPanel.selectedTasksCount() === 0"
    />
  }

  @if (!isPomodoroTaskSelectMode()) {
    <button
      type="button"
      class="pomodoro-floating-btn"
      aria-label="Abrir pomodoro"
      [attr.aria-expanded]="isPomodoroPanelVisible()"
      matTooltip="Método Pomodoro"
      matTooltipPosition="right"
      (click)="onTogglePomodoroPanel()"
    >
      <img
        src="pomodoro2.png"
        width="34"
        height="34"
        alt=""
        aria-hidden="true"
      />
    </button>

    <app-add-task-floating-button (taskCreated)="onTaskCreated($event)" />
  }
</div>
