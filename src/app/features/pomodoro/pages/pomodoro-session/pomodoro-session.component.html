<div class="pomodoro-session-page page-background page-with-header">
  <main class="container py-4">
    <div class="row mb-3">
      <div class="col">
        <nav aria-label="Navegação do Pomodoro">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="" (click)="$event.preventDefault(); onExitPomodoroMode()">Pomodoro</a></li>
            <li class="breadcrumb-item active" aria-current="page">Seleção de tarefas</li>
          </ol>
        </nav>
      </div>
    </div>

    @if (hasTasks()) {
      <div class="row mb-3">
        <div class="col">
          <section class="pomodoro-selection-instruction" role="status" aria-live="polite">
            <p>Selecione as tarefas e aperte o botão no canto para iniciar o Pomodoro.</p>
          </section>
        </div>
      </div>
    }

    <div class="row">
      <div class="col">
        <app-task-panel
          [tasks]="tasks()"
          [isLoading]="isLoadingTasks()"
          [isPomodoroSelectMode]="true"
          [clearSelectionTrigger]="0"
          [editSelectedTaskTrigger]="0"
          [deleteSelectedTasksTrigger]="0"
        />
      </div>
    </div>
  </main>

  <app-pomodoro-exit-floating-button
    ariaLabel="Sair do modo Pomodoro"
    tooltip="Sair do modo Pomodoro"
    (clicked)="onExitPomodoroMode()"
  />

  <app-pomodoro-session-start-floating-button
    ariaLabel="Iniciar método Pomodoro"
    [tooltip]="isStartDisabled() ? 'Selecione ao menos 1 tarefa para iniciar o Pomodoro' : 'Iniciar método Pomodoro'"
    [isTooltipDisabled]="!hasTasks()"
    [isDisabled]="isStartDisabled()"
    (clicked)="onStartPomodoroSession()"
  />
</div>
