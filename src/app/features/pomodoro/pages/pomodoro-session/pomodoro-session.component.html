<div class="pomodoro-session-page page-background page-with-header">
  <main class="container py-4">
    <div class="row mb-3">
      <div class="col">
        <section class="pomodoro-selection-instruction" role="status" aria-live="polite">
          <p>Selecione até 4 cards e depois aperte o botão no canto para iniciar o Pomodoro.</p>
        </section>
      </div>
    </div>

    <div class="row">
      <div class="col">
        <app-task-panel
          [tasks]="tasks()"
          [isLoading]="isLoadingTasks()"
          [isPomodoroSelectMode]="true"
          [clearSelectionTrigger]="0"
          [editSelectedTaskTrigger]="0"
          [deleteSelectedTasksTrigger]="0"
        />
      </div>
    </div>
  </main>

  <button
    type="button"
    class="pomodoro-session-exit-btn"
    aria-label="Sair do modo Pomodoro"
    matTooltip="Sair do modo Pomodoro"
    matTooltipPosition="left"
    (click)="onExitPomodoroMode()"
  >
    <mat-icon aria-hidden="true">close</mat-icon>
  </button>

  <button
    type="button"
    class="pomodoro-session-start-btn"
    aria-label="Iniciar método Pomodoro"
    [matTooltip]="isStartDisabled() ? 'Selecione ao menos 1 tarefa para iniciar o Pomodoro' : 'Iniciar método Pomodoro'"
    matTooltipPosition="left"
    disabled
    [disabled]="isStartDisabled()"
    (click)="onStartPomodoroSession()"
  >
    <mat-icon aria-hidden="true">play_arrow</mat-icon>
  </button>
</div>
