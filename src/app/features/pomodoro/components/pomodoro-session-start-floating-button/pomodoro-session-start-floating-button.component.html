<app-floating-action-button
  [ariaLabel]="ariaLabel()"
  [tooltip]="tooltip()"
  icon="play_arrow"
  bottom="148px"
  right="48px"
  mobileBottom="6.5rem"
  mobileRight="1.5rem"
  iconSize="38px"
  backgroundColor="var(--color-secondary)"
  outlineColor="var(--color-secondary)"
  [isTooltipDisabled]="isTooltipDisabled()"
  [disabled]="isDisabled()"
  (clicked)="onClick()"
></app-floating-action-button>
