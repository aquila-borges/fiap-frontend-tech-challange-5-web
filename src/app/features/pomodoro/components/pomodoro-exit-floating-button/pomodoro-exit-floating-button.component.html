<app-floating-action-button
  [ariaLabel]="ariaLabel()"
  [tooltip]="tooltip()"
  icon="close"
  [bottom]="variant() === 'mode' ? '148px' : '228px'"
  right="48px"
  [mobileBottom]="variant() === 'mode' ? '6.5rem' : '12rem'"
  mobileRight="1.5rem"
  iconSize="32px"
  backgroundColor="var(--color-error)"
  outlineColor="var(--color-error)"
  (clicked)="onClick()"
/>
