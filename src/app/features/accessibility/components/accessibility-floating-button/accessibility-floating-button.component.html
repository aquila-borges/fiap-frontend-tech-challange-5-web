@if (!accessibilityService.isPanelOpen()) {
  <button
    type="button"
    class="accessibility-floating-btn"
    (click)="onToggle()"
    aria-label="Abrir menu de acessibilidade"
    matTooltip="Acessibilidade"
    matTooltipPosition="left"
  >
    <mat-icon aria-hidden="true">accessibility_new</mat-icon>
  </button>
}
