@if (!accessibilityService.isPanelOpen()) {
  <app-floating-action-button
    ariaLabel="Abrir menu de acessibilidade"
    tooltip="Acessibilidade"
    icon="accessibility_new"
    bottom="48px"
    right="48px"
    mobileBottom="1.5rem"
    mobileRight="1.5rem"
    iconSize="38px"
    backgroundColor="var(--gradient-primary)"
    outlineColor="var(--color-primary)"
    (clicked)="onToggle()"
  />
}
