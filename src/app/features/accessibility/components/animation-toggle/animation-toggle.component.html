<button
  type="button"
  class="animation-toggle-trigger shadow-sm"
  [class.active]="accessibilityService.reducedMotionEnabled()"
  (click)="onToggle()"
  [attr.aria-label]="accessibilityService.reducedMotionEnabled() ? 'Reproduzir animações' : 'Parar animações'"
>
  <i
    class="fa-solid"
    [class.fa-pause]="accessibilityService.reducedMotionEnabled()"
    [class.fa-play]="!accessibilityService.reducedMotionEnabled()"
    aria-hidden="true"
  ></i>
  <span class="animation-toggle-label">Animações</span>
  <span class="animation-toggle-current">
    {{ accessibilityService.reducedMotionEnabled() ? 'Desligadas' : 'Ligadas' }}
  </span>
</button>
