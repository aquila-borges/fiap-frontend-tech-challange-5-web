<button
  type="button"
  class="text-spacing-trigger shadow-sm"
  [class.active]="accessibilityService.isCustomTextSpacingActive()"
  (click)="onCycle()"
  [attr.aria-label]="'Alterar espaçamento de texto. Nível atual: ' + accessibilityService.getTextSpacingLabel()"
>
  <i class="fa-solid fa-text-width" aria-hidden="true"></i>
  <span class="text-spacing-label">Espaçamento do texto</span>
  <span class="text-spacing-current">{{ accessibilityService.getTextSpacingLabel() }}</span>
</button>
