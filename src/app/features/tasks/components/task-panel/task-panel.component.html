<section class="task-panel" aria-label="Painel de tarefas">
  @if (tasks().length > 0) {
      <app-task-panel-header
        #taskHeaderActions
        [isPomodoroSelectMode]="isPomodoroSelectMode()"
        [selectedTasksCount]="selectedTasksCount()"
        [hasSelectedTasks]="hasSelectedTasks()"
        [canEditSelectedTask]="canEditSelectedTask()"
        [isSortDropdownOpen]="isSortDropdownOpen()"
        [isSortDropdownClosing]="isSortDropdownClosing()"
        [sortOption]="sortOption()"
        [isFilterDropdownOpen]="isFilterDropdownOpen()"
        [isFilterDropdownClosing]="isFilterDropdownClosing()"
        [filterOption]="filterOption()"
        [hasActiveFilter]="hasActiveFilter()"
        [effectiveIsListView]="effectiveIsListView()"
        [isAccessibleFontEnabled]="isAccessibleFontEnabled()"
        [gridColumnsTooltip]="getGridColumnsTooltip()"
        (clearSelectionRequested)="clearSelection()"
        (editSelectedRequested)="onEditSelectedTask()"
        (deleteSelectedRequested)="onDeleteSelectedTasks()"
        (toggleSortDropdownRequested)="toggleSortDropdown()"
        (closeSortDropdownRequested)="closeSortDropdown()"
        (applySortOptionRequested)="applySortOption($event)"
        (toggleFilterDropdownRequested)="toggleFilterDropdown()"
        (closeFilterDropdownRequested)="closeFilterDropdown()"
        (applyFilterOptionRequested)="applyFilterOption($event)"
        (setListViewRequested)="setListView()"
        (cycleGridColumnsRequested)="cycleGridColumns()"
        (toggleTaskCardFontRequested)="toggleTaskCardFont()"
      />
  }

  @if (isLoading()) {
    <div class="task-loading" role="status" aria-live="polite" aria-label="Carregando tarefas">
      <span class="task-loading__spinner" aria-hidden="true"></span>
      <p class="task-loading__text">Carregando tarefas...</p>
    </div>
  } @else if (tasks().length === 0) {
    <app-task-empty-panel-spotlight />
  } @else {
    <div
      class="task-grid"
      [class.task-grid--list]="effectiveIsListView()"
      [class.task-grid--cols-2]="!effectiveIsListView() && effectiveGridColumns() === 2"
      [class.task-grid--cols-3]="!effectiveIsListView() && effectiveGridColumns() === 3"
      [class.task-grid--cols-4]="!effectiveIsListView() && effectiveGridColumns() === 4"
      [class.task-grid--cols-5]="!effectiveIsListView() && effectiveGridColumns() === 5"
    >
      @for (task of sortedTasks(); track task.id) {
        <app-task-note
          [task]="task"
          [isSelected]="isSelected(task.id)"
          [isClicking]="isClicking(task.id)"
          [isPomodoroDisabled]="isCardDisabledInPomodoroMode(task.id)"
          [useHandwrittenTaskFont]="useHandwrittenTaskFont()"
          [isPomodoroSelectMode]="isPomodoroSelectMode()"
          (selectionToggle)="onToggleTaskSelection($event)"
          (editRequested)="onTaskNoteEditRequested($event)"
        />
      }
    </div>
  }
</section>
